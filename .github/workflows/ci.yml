name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    env:
      # Override the large heap configured in gradle.properties — CI runners have ~7GB total RAM.
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=2g -Dfile.encoding=UTF-8"

    steps:
      - uses: actions/checkout@v4
        with:
          # ratchetFrom = "origin/main" in spotless needs the full history to compute the diff.
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Check code formatting (Spotless)
        run: ./gradlew spotlessCheck

      - name: Run desktop tests
        run: ./gradlew :engine:desktopTest

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: |
            engine/build/reports/tests/
            engine/build/test-results/
