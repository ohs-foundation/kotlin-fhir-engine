name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Override the large heap configured in gradle.properties — CI runners have ~7GB total RAM.
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=2g -Dfile.encoding=UTF-8"

jobs:
  test:
    name: Run Tests
    # macos-latest so Kotlin/Native can also cross-compile the iOS targets (arm64 + simulator) —
    # Apple targets only cross-compile on a macOS host.
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # ratchetFrom = "origin/main" in spotless needs the full history to compute the diff.
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Check code formatting (Spotless)
        run: ./gradlew spotlessCheck

      - name: Check all platforms compile
        # Unqualified task names run in every subproject that declares them (:engine, :engine-app,
        # and :sqlite-wasm-worker for js/wasmJs), so this covers every platform in one call.
        run: >
          ./gradlew compileDebugKotlinAndroid compileKotlinDesktop compileKotlinJs
          compileKotlinWasmJs compileKotlinIosArm64 compileKotlinIosSimulatorArm64

      - name: Run desktop tests
        run: ./gradlew :engine:desktopTest

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: |
            engine/build/reports/tests/
            engine/build/test-results/
